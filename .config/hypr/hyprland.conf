################
### MONITORS ###
################
# --- THEME SETTINGS ---
$barHeight = 54
monitor = , addreserved, $barHeight, 0, 0, 0

source = ~/.config/hypr/monitors.conf
source = ~/.cache/wal/colors-hyprland.conf

###################
### MY PROGRAMS ###
###################
$terminal = kitty -e fish
$fileManager = dolphin
$menu = pkill rofi || rofi -show drun
$firefox = firefox
$libreoffice = libreoffice
$discord = discord

#################
### AUTOSTART ###
#################
exec-once = $terminal
exec-once = waybar > /dev/null 2>&1
exec-once = fcitx5
exec-once = flameshot
exec-once = dunst
exec-once = clipse -listen
exec-once = ~/.config/hypr/scripts/random-wallpaper.sh
exec-once = [workspace 2 silent] $firefox

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = WLR_DRM_DEVICES,/dev/dri/card0
env = WLR_NO_HARDWARE_CURSORS,1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################
general {
    # Size of the border around windows. [1]
    border_size = 0

    # Disable borders for floating windows. [false]
    no_border_on_floating = false
    gaps_in = 5
    gaps_out = 10                 # Increased slightly to show off the blur
    col.inactive_border = $background
    col.active_border = $color1 $color10 45deg

    # Gaps between windows and monitor edges,
    # also supports css style gaps (top, right, bottom, left -> 5,10,15,20). [20]
    gaps_out = 5

    # Gaps between windows and monitor edges for floating windows,
    # also supports css style gaps (top, right, bottom, left -> 5 10 15 20).
    # -1 means default. [0]
    float_gaps = 0

    # Gaps between workspaces. Stacks with gaps_out. [0]
    gaps_workspaces = 0

    # Border color for inactive windows. [0xff444444]
    col.inactive_border = 0xff595046

    # Border color for the active window. [0xffffffff]
    col.active_border = 0xfff2e4c9 0xffd6c6a6 45deg

    # Inactive border color for window that cannot
    # be added to a group (see denywindowfromgroup dispatcher). [0xffffaaff]
    col.nogroup_border = 0xffffaaff

    # Active border color for window that cannot be added to a group. [0xffff00ff]
    col.nogroup_border_active = 0xffff00ff

    # Which layout to use (dwindle/master). [dwindle]
    layout = "dwindle"
    allow_tearing = false
}

##################################
### ACRYLIC DECORATION SETTINGS ###
##################################
decoration {
    rounding = 15                 # Slightly tighter corners look better with blur

    # --- OPACITY ---
    # This is what makes windows transparent so you can see through them
    active_opacity = 0.85         # The "Sweet Spot" for readability + aesthetics
    inactive_opacity = 0.80       # Slightly more transparent when not focused

    # --- BLUR (The Frosting) ---
    blur {
        enabled = true
        size = 6                  # Medium blur spread
        passes = 3                # CRITICAL: 3 passes creates the milky "Acrylic" look
        new_optimizations = true
        ignore_opacity = true
        xray = false              # Keep false to ensure text remains readable
        noise = 0.02              # Adds a tiny grain texture (premium feel)
        contrast = 1.0            # Adjusted for better color accuracy
        brightness = 1.0
        vibrancy = 0.2
    }

    # --- SHADOWS ---
    shadow {
        enabled = true
        range = 15                # Larger shadow makes the acrylic window "float"
        render_power = 3
        ignore_window = true
        color = rgba(00000055)    # Darker, more visible shadow for contrast
    }

    # Dimming
    dim_inactive = false
    dim_strength = 0.1
}

# Animations (Kept your existing settings)
animations {
    enabled = yes
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade

    bezier = heavyEasel, 0.10, 0.9, 0.1, 1.05
    bezier = inkFlow, 0.45, 0, 0.55, 1

    # --- The Animations ---
    # GLOBAL: Everything moves with a bit of weight
    animation = global, 1, 6, inkFlow

    # WINDOWS OPEN: Slide in like a heavy painting frame being moved into place
    animation = windowsIn, 1, 5, heavyEasel, slide

    # WINDOWS CLOSE: Fade out and slightly recede, like a memory or ghost
    animation = windowsOut, 1, 6, inkFlow, popin 80%

    # WINDOWS MOVE: Dragging them feels heavy
    animation = windowsMove, 1, 7, heavyEasel

    # LAYERS (Rofi, Waybar): Fade in smoothly
    animation = layers, 1, 4, inkFlow, fade
    animation = fadeLayersIn, 1, 4, inkFlow
    animation = fadeLayersOut, 1, 4, inkFlow

    # WORKSPACES: The "Tapestry Scroll" effect.
    animation = workspaces, 1, 6, heavyEasel, slide
    animation = workspacesIn, 1, 6, heavyEasel, slide
    animation = workspacesOut, 1, 6, heavyEasel, slide
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, Q, killactive,
bind = $mainMod, L, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, O, pseudo,
bind = $mainMod, J, togglesplit,

# Apps
bind = $mainMod, Z, exec, $terminal
bind = $mainMod, D, exec, $fileManager
bind = $mainMod, F, exec, $firefox
bind = $mainMod, W, exec, $libreoffice
bind = $mainMod, D, exec, $discord
bind = $mainMod, R, exec, $menu

# Scripts
bind = $mainMod ALT, B, exec, ~/.config/hypr/scripts/toggle-bluetooth.sh
bind = $mainMod ALT, N, exec, ~/.config/hypr/scripts/toggle-network.sh
bind = $mainMod ALT, P, exec, ~/.config/hypr/scripts/screenshot.sh
bind = $mainMod ALT, W, exec, ~/.config/hypr/scripts/random-wallpaper.sh > /dev/null 2>&1

# Window Movement
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, right, movewindow, r

# Focus Movement
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media Keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
ecosystem:no_update_news = true

# --- ACRYLIC FIXES ---
# We use 'windowrulev2' which supports the 'override' keyword correctly
windowrulev2 = opacity 1.0 override 1.0 override, class:^(rofi)$
windowrulev2 = opacity 1.0 override 1.0 override, class:^(vlc)$
windowrulev2 = opacity 1.0 override 1.0 override, class:^(mpv)$
