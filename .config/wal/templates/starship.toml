# ~/.config/wal/templates/starship.toml

# PROMPT LAYOUT
format = """
[ пМГ $user ](bg:{color4} fg:{background})\
[оВі](bg:{color5} fg:{color4})\
$directory\
[оВі](bg:{color3} fg:{color5})\
$custom\
$git_branch\
$git_status\
[оВі](bg:{color1} fg:{color3})\
$time\
[оВі](fg:{color1})\
\n$character"""

# USERNAME
[username]
show_always = true
style_user = "bg:{color4} fg:{background}"
style_root = "bg:{color4} fg:{background}"
format = '[ $user ]($style)'

# DIRECTORY
[directory]
style = "fg:{background} bg:{color5}"
format = "[ $path ]($style)"
truncation_length = 0
truncate_to_repo = false
truncation_symbol = "вА¶/"

# DIRECTORY ICONS
[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "
"Projects" = "пБї "

# DOTFILES BRANCH
# This explicitly checks your ~/.dotfiles repo when you are at ~
[custom.dotfiles]
description = "Dotfiles Branch"
command = "git --git-dir=$HOME/.dotfiles/ --work-tree=$HOME branch --show-current 2>/dev/null"
when = """ test "$PWD" = "$HOME" """
style = "bg:{color3}"
format = '[[ пРШ $output ](fg:{background} bg:{color3})]($style)'

# GIT BRANCH
[git_branch]
symbol = "пРШ"
style = "bg:{color3}"
format = '[[ $symbol $branch(:$remote_branch) ](fg:{background} bg:{color3})]($style)'

[git_status]
style = "bg:{color3}"
format = '[[($all_status$ahead_behind )](fg:{background} bg:{color3})]($style)'

# TIME
[time]
disabled = false
time_format = "%R"
style = "bg:{color1}"
format = '[[ пРЇ $time ](fg:{background} bg:{color1})]($style)'

# EXTRAS
[nodejs]
symbol = "оЬШ"
format = '[$symbol($version) ](fg:{color2})'

[rust]
symbol = "оЮ®"
format = '[$symbol($version) ](fg:{color2})'

[golang]
symbol = "оШІ"
format = '[$symbol($version) ](fg:{color2})'

[php]
symbol = "оШИ"
format = '[$symbol($version) ](fg:{color2})'

[cmd_duration]
min_time = 2000
format = '[ пЙУ $duration ](fg:{color3})'

[character]
success_symbol = "[вЭѓ](bold {color2})"
error_symbol = "[вЭѓ](bold {color1})"
