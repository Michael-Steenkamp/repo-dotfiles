format = """
[ пМГ  ](bg:{color4} fg:{background})\
[оВі](bg:{color5} fg:{color4})\
$directory\
[оВі](fg:{color5} bg:{color3})\
$git_branch\
$git_status\
[оВі](fg:{color3} bg:{color2})\
$nodejs\
$rust\
$golang\
$php\
[оВі](fg:{color2} bg:{color1})\
$time\
[оВі ](fg:{color1})\
\n$character"""

[directory]
style = "fg:{background} bg:{color5}"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:{color3}"
format = '[[ $symbol $branch ](fg:{background} bg:{color3})]($style)'

[git_status]
style = "bg:{color3}"
format = '[[($all_status$ahead_behind )](fg:{background} bg:{color3})]($style)'

[nodejs]
symbol = "оЬШ"
style = "bg:{color2}"
format = '[[ $symbol ($version) ](fg:{background} bg:{color2})]($style)'

[rust]
symbol = "оЮ®"
style = "bg:{color2}"
format = '[[ $symbol ($version) ](fg:{background} bg:{color2})]($style)'

[golang]
symbol = "оШІ"
style = "bg:{color2}"
format = '[[ $symbol ($version) ](fg:{background} bg:{color2})]($style)'

[php]
symbol = "оШИ"
style = "bg:{color2}"
format = '[[ $symbol ($version) ](fg:{background} bg:{color2})]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:{color1}"
format = '[[ пРЇ $time ](fg:{background} bg:{color1})]($style)'
