include ~/.cache/wal/colors-kitty.conf

font_family       JetBrainsMono Nerd Font
font_size         13
bold_font         auto
italic_font       auto
bold_italic_font  auto

force_ltr         no
background_opacity 0.5

# Override Wallust selection colors for better readability
# This makes selected text distinct (standard grey-ish highlight)
selection_foreground none
selection_background #444444
